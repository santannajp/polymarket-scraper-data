services:
  # The Database: PostgreSQL + TimescaleDB
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: poly_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-polymarket}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d polymarket"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The Queue Broker: Redis
  redis:
    image: redis:alpine
    container_name: poly_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
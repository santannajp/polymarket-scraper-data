services:
  # The Database: PostgreSQL + TimescaleDB
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: poly_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-polymarket}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d polymarket"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The Queue Broker: Redis
  redis:
    image: redis:alpine
    container_name: poly_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # The Market Discovery Worker (runs periodically)
  market-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poly_market_worker
    restart: always
    env_file: .env
    command: >
      bash -c "
        echo 'Waiting for DB and Redis...' &&
        uv run python scripts/check_setup.py &&
        echo 'Services are up. Starting market worker loop.' &&
        while true; do
          uv run src/markets.py;
          echo 'Market run finished. Waiting 1 hour...';
          sleep 3600;
        done
      "
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # The Price History Worker (runs continuously)
  price-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poly_price_worker
    restart: always
    env_file: .env
    command: >
      bash -c "
        echo 'Waiting for DB and Redis...' &&
        uv run python scripts/check_setup.py &&
        echo 'Services are up. Starting price worker.' &&
        uv run src/price_worker.py
      "
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data: